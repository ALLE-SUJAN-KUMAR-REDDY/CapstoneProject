[pytest]
testpaths = tests
addopts = 
    --html=reports/report.html
    --self-contained-html
    -v
    --tb=short
log_cli = true
log_cli_level = INFO
log_file = logs/test_run.log
log_file_level = DEBUG
log_file_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
markers =
    oneway: One-way flight booking tests
    roundtrip: Round-trip flight booking tests
    smoke: Smoke tests
